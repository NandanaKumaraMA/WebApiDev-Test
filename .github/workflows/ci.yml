name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Start server & smoke test
        run: |
          node index.js &
          SERVER_PID=$!
          sleep 2
          curl -s --retry 5 --retry-delay 2 http://localhost:3000/ || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID
